<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Bioalergia · Alergología e Inmunología</title>
    <meta
      name="description"
      content="Consulta de alergología e inmunología en Concepción. Diagnóstico preciso, tratamientos modernos y seguimiento personalizado."
    />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f1c26" />
    <meta name="robots" content="index, follow" />
    <script>
      // FOIT-prevention: sync data-theme BEFORE React mounts.
      // Matches STORAGE_KEY in src/lib/theme.ts.
      (() => {
        const KEY = "bioalergia.theme";
        let theme = "light";
        try {
          const stored = localStorage.getItem(KEY);
          if (stored === "dark" || stored === "light") {
            theme = stored;
          } else if (window.matchMedia?.("(prefers-color-scheme: dark)").matches) {
            theme = "dark";
          }
        } catch (_) {}
        document.documentElement.dataset.theme = theme;
      })();
    </script>
