packages:
  - "apps/*"
  - "packages/*"

# pnpm v11 pattern for `pnpm deploy`: each consumer that needs to be
# deployed declares its workspace deps as injected via the per-package
# `dependenciesMeta.<pkg>.injected: true` in its own package.json
# (see apps/api/package.json). This is the v11+ golden pattern — more
# surgical than the workspace-wide `injectWorkspacePackages` setting,
# which would force-copy every workspace dep across the entire monorepo
# (slower dev installs, larger node_modules). The deprecated alternative
# is `pnpm deploy --legacy`, which we explicitly avoid.
# Refs: https://pnpm.io/settings#injectworkspacepackages
#       https://pnpm.io/package_json#dependenciesmetainjected

# pnpm 11 blocks every postinstall by default. Only binaries / native
# bindings below get to run install scripts. ZenStack manages Prisma
# engines so we opt those out.
allowBuilds:
  argon2: true
  core-js: true
  esbuild: true
  impit: true
  msw: true
  protobufjs: true
  sharp: true
  prisma: false
  "@prisma/engines": false

# Opt out of pnpm 11's default 24h release-age gate (lockfile path
# unaffected — pnpm/pnpm#10438).
minimumReleaseAge: 0
