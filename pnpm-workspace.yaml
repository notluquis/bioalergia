packages:
  - "apps/*"
  - "packages/*"

# pnpm v10+ refuses `pnpm deploy` on workspaces that symlink internal
# packages — bundling won't work because the symlinks can't be flattened
# into the deploy folder. The supported fix is to inject workspace deps
# (copy instead of symlink) so `pnpm deploy` can bundle them.
# Workspace-level is the golden 2026 pattern per pnpm docs
# (https://pnpm.io/settings#injectworkspacepackages); the deprecated
# alternative is --legacy on every deploy invocation, which we explicitly
# avoid.
injectWorkspacePackages: true

# pnpm 11 blocks every postinstall by default. Only binaries / native
# bindings below get to run install scripts. ZenStack manages Prisma
# engines so we opt those out.
allowBuilds:
  argon2: true
  core-js: true
  esbuild: true
  impit: true
  msw: true
  protobufjs: true
  sharp: true
  prisma: false
  "@prisma/engines": false

# Opt out of pnpm 11's default 24h release-age gate (lockfile path
# unaffected — pnpm/pnpm#10438).
minimumReleaseAge: 0
