packages:
  - "apps/*"
  - "packages/*"

# pnpm v11 pattern for `pnpm deploy`: we also declare per-consumer
# `dependenciesMeta.<pkg>.injected: true` in each consumer's
# package.json (see apps/api/package.json). The workspace-wide setting
# below is the belt-and-suspenders fallback because `turbo prune`
# (verified up to 2.9.1) strips `dependenciesMeta.injected` from the
# pruned package.json that lands in `out/json/` inside the Docker
# build, so the per-consumer hint never reaches the install stage. The
# workspace-wide flag does survive prune. The deprecated alternative
# is `pnpm deploy --legacy`, which we explicitly avoid.
# Refs: https://pnpm.io/settings#injectworkspacepackages
#       https://pnpm.io/package_json#dependenciesmetainjected
injectWorkspacePackages: true

# pnpm 11 blocks every postinstall by default. Only binaries / native
# bindings below get to run install scripts. ZenStack manages Prisma
# engines so we opt those out.
allowBuilds:
  argon2: true
  core-js: true
  esbuild: true
  impit: true
  msw: true
  protobufjs: true
  sharp: true
  prisma: false
  "@prisma/engines": false
  "@sentry/cli": true

# Opt out of pnpm 11's default 24h release-age gate (lockfile path
# unaffected — pnpm/pnpm#10438).
minimumReleaseAge: 0

# Dependency overrides. pnpm 11 reads these from pnpm-workspace.yaml,
# NOT the root package.json `pnpm.overrides` block (silently ignored
# when a pnpm-workspace.yaml exists — was the case here pre-2026-06, the
# playwright/kysely pins below sat inert until moved here).
#
# google-auth-library: DEDUP pin, not a version pin. googleapis-common
# (under @googleapis/calendar + @googleapis/drive) bundles its own
# google-auth-library; without this override the tree carries two copies
# (10.5.0 transitive + 10.7.0 direct). The `GoogleAuth` instance we build
# from the 10.7.0 copy then fails to assign to `calendar({ auth })` whose
# Options.auth type comes from the 10.5.0 copy (TS2769 — separate private
# `redirectUri` decls). Deduping to one version aligns the types. Keep at
# whatever google-auth-library the api directly depends on. Code uses
# `new GoogleAuth({ credentials, scopes })`, NOT `new JWT(...)`: 10.7.0
# added a private field to OAuth2Client that breaks JWT's structural
# assignability to the auth union (GoogleAuth is in the union explicitly).
overrides:
  playwright: ^1.60.0
  kysely: ^0.29.2
  google-auth-library: ^10.7.0
  # Security: force lodash-es past the 4.17.x line (transitive via the
  # ZenStack toolchain @zenstackhq/language>langium>chevrotain). 4.18.0 is the
  # minimum that clears all three advisories — verified against the GitHub
  # advisory DB (jun 2026): GHSA-r5fr-rjxr-66jc (_.template code injection,
  # CVE-2026-4800, patched 4.18.0), GHSA-f23m-r3pf-42rh (_.unset/_.omit array-
  # path prototype pollution, patched 4.18.0), GHSA-xxjr-mmjv-4gpg (patched
  # 4.17.23). NOTE: there is no 4.17.24 — the maintainers (jdalton) shipped the
  # fixes as the 4.18.0 minor, so 4.17.23 is NOT sufficient.
  lodash-es: ^4.18.0
  # Dedupe TanStack Store: react-router@1.170 pins @tanstack/react-store@^0.9.3
  # (→ store 0.9.3, no `nonReactive`), while react-form@1.33 + our direct deps
  # use 0.11. Vite ended up running react-store@0.11's `useStore` against a
  # store@0.9.3 instance → runtime crash `d.nonReactive is not an object`.
  # Force a single 0.11 line (additive over 0.9.3, so router still works).
  "@tanstack/store": 0.11.0
  "@tanstack/react-store": 0.11.0

patchedDependencies:
  msw@2.14.6: patches/msw@2.14.6.patch
