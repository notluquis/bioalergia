name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, type-check and test
        env:
          TURBO_TELEMETRY_DISABLED: "1"
          TURBO_RUN_FLAGS: ${{ github.event_name == 'pull_request' && '--affected' || '' }}
          # Pin the diff base for `turbo run --affected`. github.base_ref is
          # the target branch on PRs (e.g. "main"); falls back to origin/main
          # for push events. Avoids "Failed to resolve base ref" when the
          # local checkout has no main branch tracking pointer.
          TURBO_SCM_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'origin/main' }}
        run: pnpm turbo run lint type-check test $TURBO_RUN_FLAGS --continue=never --summarize --output-logs=errors-only

  build:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build affected packages
        env:
          TURBO_TELEMETRY_DISABLED: "1"
          TURBO_RUN_FLAGS: ${{ github.event_name == 'pull_request' && '--affected' || '' }}
          TURBO_SCM_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'origin/main' }}
        run: pnpm turbo run build $TURBO_RUN_FLAGS --continue=never --summarize --output-logs=errors-only
