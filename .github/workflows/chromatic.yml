name: chromatic

on:
  push:
    branches:
      - main
    paths:
      - "apps/intranet/**"
      - "apps/site/**"
      - "packages/db/**"
      - "packages/orpc-contracts/**"
      - "package.json"
      - "turbo.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/chromatic.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/intranet/**"
      - "apps/site/**"
      - "packages/db/**"
      - "packages/orpc-contracts/**"
      - "package.json"
      - "turbo.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/chromatic.yml"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      intranet: ${{ steps.filter.outputs.intranet }}
      site: ${{ steps.filter.outputs.site }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect affected storybooks
        id: filter
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          TURBO_TELEMETRY_DISABLED: "1"
        run: |
          pnpm turbo query affected --packages @finanzas/intranet --tasks build-storybook --base "$BASE_SHA" --head "$HEAD_SHA" > intranet-affected.json
          pnpm turbo query affected --packages @finanzas/site --tasks build-storybook --base "$BASE_SHA" --head "$HEAD_SHA" > site-affected.json
          echo "intranet=$(node -e "const fs=require('fs');const v=JSON.parse(fs.readFileSync('intranet-affected.json','utf8'));process.stdout.write(String((v.data?.affectedTasks?.length ?? 0) > 0))")" >> "$GITHUB_OUTPUT"
          echo "site=$(node -e "const fs=require('fs');const v=JSON.parse(fs.readFileSync('site-affected.json','utf8'));process.stdout.write(String((v.data?.affectedTasks?.length ?? 0) > 0))")" >> "$GITHUB_OUTPUT"

  chromatic-intranet:
    needs: changes
    if: needs.changes.outputs.intranet == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Chromatic (intranet)
        run: pnpm -C apps/intranet chromatic
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN_INTRANET }}

  chromatic-site:
    needs: changes
    if: needs.changes.outputs.site == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Chromatic (site)
        run: pnpm -C apps/site chromatic
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN_SITE }}
