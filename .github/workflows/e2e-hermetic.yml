name: e2e-hermetic

# Authed e2e against an EPHEMERAL, synthetically-seeded Postgres — $0, no PHI.
# Non-blocking until proven stable; keep OUT of branch-protection required
# checks. Triggered manually + on PRs touching the app.

# PR runs are read-only (checkout + run e2e). The manual update-snapshots
# path needs contents:write to commit Linux-rendered baselines back to the
# branch; scoped via the job-level permissions override on that step.
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Regenerate route-snapshots baselines (Linux) + commit them to the branch"
        type: boolean
        required: false
        default: false
  pull_request:
    branches: [main, forthcoming-ocelot]
    paths:
      - "apps/intranet/**"
      - "apps/api/**"
      - "packages/db/**"
      - ".github/workflows/e2e-hermetic.yml"

jobs:
  e2e-hermetic:
    runs-on: ubuntu-latest
    # write only needed for the manual update-snapshots commit-back; the PR
    # path never writes (the commit step is gated on the dispatch input).
    permissions:
      contents: write
    env:
      # Ephemeral DB — destroyed with the job. NEVER prod.
      DATABASE_URL: postgres://e2e:e2e@localhost:5432/bioalergia_e2e
      NODE_ENV: test
      CI: "true"
      DISABLE_QUEUE_RUNNER: "true"
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
          POSTGRES_DB: bioalergia_e2e
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
        with:
          # Token + full history so the update-snapshots path can push the
          # regenerated baselines back to the branch (default shallow
          # checkout can't push).
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: 26, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      # orpc-contracts dist (api imports @finanzas/orpc-contracts at runtime;
      # without this the api webServer + seed-e2e-user crash with
      # ERR_MODULE_NOT_FOUND on dist/index.js).
      - run: pnpm -F @finanzas/orpc-contracts build

      # db .mjs (api/intranet import it) + fresh schema via db push (NOT
      # migrate deploy — the rebaseline migration assumes existing tables;
      # db push is correct for a throwaway DB) + synthetic faker data.
      - run: pnpm -F @finanzas/db build
      # api importa @finanzas/social-render desde dist .mjs al bootear nativo.
      - run: pnpm -F @finanzas/social-render build
      - run: pnpm -F @finanzas/db db:push
      - run: pnpm -F @finanzas/db seed:synthetic

      # Seed the dedicated E2E user (random password each run) and export the
      # printed creds so authed specs actually log in (the fixture bails on
      # `!E2E_USER` and would otherwise skip every authed spec vacuously).
      - name: Seed E2E user + export creds
        run: |
          CREDS=$(node apps/api/scripts/seed-e2e-user.ts | tail -1)
          E2E_USER=$(printf '%s' "$CREDS" | sed -n 's/.*EMAIL=\([^ ]*\).*/\1/p')
          E2E_PASS=$(printf '%s' "$CREDS" | sed -n 's/.*PASS=\([^ ]*\).*/\1/p')
          echo "::add-mask::$E2E_PASS"
          echo "E2E_USER=$E2E_USER" >> "$GITHUB_ENV"
          echo "E2E_PASS=$E2E_PASS" >> "$GITHUB_ENV"

      # Layer-3 DB read-only role (hermetic only). All writes above
      # (db:push, seed:synthetic, seed-e2e-user) ran under the full-access
      # `e2e` superuser. From here on the api that Playwright boots connects
      # as `e2e_readonly`, which the SQL grants SELECT everywhere + a narrow
      # column-level UPDATE on the auth-bookkeeping columns of `users` (so
      # login's session/lockout stamp still works) + INSERT on audit_logs.
      # Any other mutation is rejected at the DB. graphile-worker is off
      # (DISABLE_QUEUE_RUNNER=true) so no background writer fights the role.
      # Non-blocking: this whole job is excluded from branch protection.
      - name: Create e2e_readonly DB role + export readonly URL
        run: |
          E2E_RO_PASS="$(openssl rand -base64 32 | tr -d '=+/' | head -c 32)"
          echo "::add-mask::$E2E_RO_PASS"
          psql "$DATABASE_URL" \
            -v ON_ERROR_STOP=1 \
            -v pw="$E2E_RO_PASS" \
            -f apps/api/scripts/setup-postgres-readonly-role.sql
          echo "DATABASE_URL_READONLY=postgres://e2e_readonly:${E2E_RO_PASS}@localhost:5432/bioalergia_e2e" >> "$GITHUB_ENV"

      # Production SPA bundle (preview serves dist/).
      - run: pnpm -F @finanzas/intranet build

      # Playwright boots api(:4000)+preview(:4173) via its webServer array
      # (HERMETIC=true because DATABASE_URL is set and E2E_BASE_URL is not).
      # The api webServer reads DATABASE_URL_READONLY → DATABASE_URL fallback
      # in playwright.config.ts, so the booted api connects as e2e_readonly.
      - run: pnpm -F @finanzas/intranet exec playwright install --with-deps chromium webkit

      # Default PR/dispatch run: full hermetic suite. RUN_SNAPSHOTS unset →
      # route-snapshots.spec is IGNORED (non-blocking until Linux baselines
      # prove stable).
      - name: Run hermetic e2e suite
        if: ${{ inputs.update_snapshots != true }}
        run: pnpm -F @finanzas/intranet exec playwright test

      # Manual baseline regeneration (workflow_dispatch with
      # update_snapshots=true): RUN_SNAPSHOTS=true opts route-snapshots in,
      # --update-snapshots writes Linux-rendered PNGs against the
      # synthetic-seeded ephemeral DB (PHI-free, deterministic via
      # faker.seed). Snapshot reads only → compatible with the readonly role.
      - name: Regenerate route-snapshots baselines (Linux)
        if: ${{ inputs.update_snapshots == true }}
        env:
          RUN_SNAPSHOTS: "true"
        run: pnpm -F @finanzas/intranet exec playwright test route-snapshots --update-snapshots

      - name: Commit regenerated baselines
        if: ${{ inputs.update_snapshots == true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "apps/intranet/e2e/route-snapshots.spec.ts-snapshots/**" || true
          if git diff --cached --quiet; then
            echo "No baseline changes."
            exit 0
          fi
          git commit -m "chore(snapshots): regenerate route-snapshots baselines (hermetic, Linux)"
          git push origin "HEAD:${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-hermetic
          path: apps/intranet/playwright-report
          retention-days: 7
